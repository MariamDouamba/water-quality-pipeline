name: CI - Water Quality Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-validate:
    name: Lint & Validate
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort

      - name: Check code formatting with Black
        run: |
          black --check --line-length 100 notebooks/ config/ tests/

      - name: Check import sorting with isort
        run: |
          isort --check-only --profile black notebooks/ config/ tests/

      - name: Lint with flake8
        run: |
          flake8 config/ tests/ \
            --max-line-length 100 \
            --ignore E501,W503,E402 \
            --exclude __pycache__

      - name: Validate notebook structure
        run: |
          echo "Validating notebook files exist..."
          test -f notebooks/01_DLT_Ingestion_Qualite_Eau.py || exit 1
          test -f notebooks/02_Silver_Transformation.py || exit 1
          test -f notebooks/03_Gold_Agregations.py || exit 1
          echo "All notebooks present!"

      - name: Validate config
        run: |
          echo "Validating config..."
          python -c "exec(open('config/pipeline_config.py').read()); print(f'Config OK: {len(CATEGORIES)} categories, {len(TABLES)} tables')"

  test-config:
    name: Test Configuration
    runs-on: ubuntu-latest
    needs: lint-and-validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Test pipeline config
        run: |
          python -c "
          exec(open('config/pipeline_config.py').read())
          
          # Vérifier que toutes les catégories ont des paramètres
          for cat, params in CATEGORIES.items():
              assert len(params) > 0, f'Catégorie vide: {cat}'
          print(f'Config: {len(CATEGORIES)} catégories validées')
          
          # Vérifier les niveaux de danger
          for level, params in DANGER_LEVELS.items():
              assert len(params) > 0, f'Niveau de danger vide: {level}'
          print(f'Config: {len(DANGER_LEVELS)} niveaux de danger validés')
          
          # Vérifier les tables
          assert len(TABLES) == 7, f'Attendu 7 tables, trouvé {len(TABLES)}'
          print(f'Config: {len(TABLES)} tables définies')
          
          # Vérifier les corrections d'encodage
          assert len(ENCODING_CORRECTIONS) > 0, 'Pas de corrections encodage'
          print(f'Config: {len(ENCODING_CORRECTIONS)} corrections encodage')
          
          print('Tous les tests config passés!')
          "

  security-check:
    name: Security Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for secrets
        run: |
          echo "Checking for hardcoded secrets..."
          ! grep -rn "password\|secret\|token\|api_key" \
            --include="*.py" --include="*.yml" \
            --exclude-dir=.git \
            config/ notebooks/ || true
          echo "Security check passed!"
